<!DOCTYPE html>
<html>
<head>
  <title>Fraud Detection System</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0px 0px 10px gray;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 8px;
      margin: 10px 0;
    }

    button {
      background: green;
      color: white;
      padding: 10px;
      border: none;
      width: 100%;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: darkgreen;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Fraud Detection</h2>

  <input type="number" id="amount" placeholder="Enter Amount">
  <input type="text" id="status" placeholder="Enter Status (fraud/safe)">

  <button onclick="handleSubmit()">Submit</button>
</div>

<script>
function handleSubmit() {
  let amount = document.getElementById("amount").value;
  let status = document.getElementById("status").value;

  fetch("http://127.0.0.1:8000/predict", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      amount: Number(amount),
      status: status
    })
  })
  .then(res => res.json())
  .then(data => {
    alert("Result: " + JSON.stringify(data));
  });
}
</script>

</body>
</html>
